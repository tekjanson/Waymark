# ============================================================
# mosquitto.conf — Waymark MQTT broker configuration
# Listeners: TCP 1883 (MCP server), WebSocket 9001 (browser)
# ============================================================

# ---------- General ----------
persistence false
log_dest stderr
log_type error
log_type warning
log_type notice
log_type information
log_type debug

# ---------- TCP listener (for MCP server) ----------
listener 1883
protocol mqtt

# ---------- WebSocket listener (for browser via nginx) ----------
listener 9001
protocol websockets

# ---------- Authentication ----------
# To generate the password file:
#   mosquitto_passwd -c /mosquitto/config/passwd waymark
# Then uncomment the lines below:
# password_file /mosquitto/config/passwd
# allow_anonymous false

# For development, allow anonymous access:
allow_anonymous true

# ---------- Topic ACL (optional, enable for production) ----------
# acl_file /mosquitto/config/acl.conf

# ---------- Limits ----------
max_connections 50
max_inflight_messages 20
max_queued_messages 100
message_size_limit 2097152

# ============================================================
# acl.conf — Mosquitto topic ACL for Waymark MQTT bridge
# Enable by uncommenting acl_file in mosquitto.conf
# ============================================================

# The 'waymark' user (used by MCP server) can read/write all waymark topics
user waymark
topic readwrite waymark/#

# Anonymous browser clients can only publish to their own session topics
# and subscribe to their own command channel.
# Note: per-client ACLs require the bridge to authenticate with a client ID
# matching the session pattern. For simplicity in dev, grant pattern-based access:
pattern readwrite waymark/%c/#

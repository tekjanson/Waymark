server {
    listen 443 ssl http2;
    server_name swiftirons.com;

    ssl_certificate     /etc/letsencrypt/live/swiftirons.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swiftirons.com/privkey.pem;

    # Gzip compression — reduces bandwidth for JS/CSS on first load and
    # ETag-validated responses, lowering CPU for SSL record encryption.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://apis.google.com; connect-src 'self' ws://localhost:9001 https://www.googleapis.com https://sheets.googleapis.com https://oauth2.googleapis.com https://drive.googleapis.com https://generativelanguage.googleapis.com; frame-src https://docs.google.com; img-src 'self' https://*.googleusercontent.com https://drive.google.com data:; style-src 'self' 'unsafe-inline';";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow recipe HTML to be fetched via the server proxy
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

server {
    listen 80;
    server_name swiftirons.com;
    return 301 https://$host$request_uri;
}

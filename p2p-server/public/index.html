<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Waymark P2P Notify</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;max-width:800px;margin:24px}
    label{display:block;margin-top:12px}
    textarea{width:100%;height:100px}
    button{margin-top:8px}
    h2{margin-top:24px}
    .panel{background:#f6f6f6;padding:12px;border-radius:6px}
    #diag-summary{white-space:pre-wrap}
    #diag-json{white-space:pre-wrap;max-height:320px;overflow:auto;background:#111;color:#ddd;padding:12px;border-radius:6px}
    #log{white-space:pre-wrap;background:#f6f6f6;padding:12px;border-radius:6px;margin-top:12px}
  </style>
</head>
<body>
  <h1>Waymark P2P Notify</h1>
  <div>
    <p id="conn-status" style="margin:0 0 12px;font-weight:bold;color:#999">Checking connection…</p>
    <label>Target peer
      <select id="target-peer" style="width:100%"></select>
    </label>
    <label>Notification title
      <input id="title" type="text" style="width:100%" placeholder="Waymark" value="Waymark" />
    </label>
    <label>Notification body
      <textarea id="body" placeholder="Type notification body..."></textarea>
    </label>
    <button id="send" disabled>Send to Phone</button>
    <div id="status"></div>
    <div id="log"></div>

    <h2>Server Diagnostics</h2>
    <div id="diag-summary" class="panel">Loading diagnostics…</div>
    <h3>Raw Diagnostics JSON</h3>
    <div id="diag-json">Loading…</div>
  </div>
  <script src="/app.js"></script>
</body>
</html>

services:
  waymark:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-}
        GIT_REPO: ${GIT_REPO:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  p2p-server:
    build:
      context: ./p2p-server
    container_name: waymark_p2p_server
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=8090
      - SHEET_ID=${WAYMARK_SIGNALING_SHEET_ID:-}
      - DISPLAY_NAME=web-server
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/service_account_key.json
      - NOTIFICATION_BUFFER_FILE=/app/data/notification-buffer.json
      - NOTIFICATION_HISTORY_FILE=/app/data/notification-history.jsonl
      - NOTIFICATION_AUTO_PUSH_INTERVAL_MS=2000
      - NOTIFICATION_STABLE_GRACE_MS=1500
    volumes:
      - p2p_data:/app/data
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/run/secrets/service_account_key.json:ro
    ports:
      - "8090:8090"
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
    restart: unless-stopped

volumes:
  p2p_data:
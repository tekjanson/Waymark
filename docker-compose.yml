version: "3.8"
services:
  waymark:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-}
        GIT_REPO: ${GIT_REPO:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl.conf:/mosquitto/config/acl.conf:ro
    restart: unless-stopped

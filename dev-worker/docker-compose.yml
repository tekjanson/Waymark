# Waymark Dev Worker — Copilot CLI headless agent container
#
# The agent runs directly via the GitHub Copilot CLI — no VS Code GUI,
# no VNC, no xdotool injection. Just the CLI in autopilot mode.
#
# All paths are parameterized via environment variables so this compose file
# works on any machine and for any repository/project.
#
# Usage:
#   docker compose -f dev-worker/docker-compose.yml up -d
#   AGENT_NAME=alpha docker compose -f dev-worker/docker-compose.yml up -d
#   REPO_URL=https://github.com/org/repo docker compose -f dev-worker/docker-compose.yml up -d
#
# Logs:
#   docker logs -f waymark-dev-worker
#
# Re-auth when token expires:
#   copilot --login   (on host, token auto-saves to ~/.copilot/config.json)
#   docker compose -f dev-worker/docker-compose.yml restart

services:
  waymark-dev-worker:
    build:
      context: .
    image: waymark-dev-worker:latest
    container_name: ${CONTAINER_NAME:-waymark-dev-worker}

    # No ports — the agent runs headlessly. Use `docker logs` for output.
    # Uncomment below to expose the Waymark dev server during test runs:
    # ports:
    #   - "127.0.0.1:3000:3000"

    environment:
      # ── AI Provider selection ────────────────────────────────────────────────
      # copilot  → GitHub Copilot CLI (needs ~/.copilot/config.json volume)
      # claude   → Anthropic Claude Code (needs ANTHROPIC_API_KEY below)
      # auto     → learn-repo.sh detects from available credentials at startup
      - AI_PROVIDER=${AI_PROVIDER:-auto}

      # ── Which custom agent / prompt to run ─────────────────────────────────
      # Copilot: @-mention an agent from .github/agents/*.agent.md
      - AGENT_COMMAND=${AGENT_COMMAND:-@waymark-builder start}
      # Claude: raw prompt (defaults to AGENT_COMMAND if not set)
      # Override this when using claude provider if you want different wording.
      - CLAUDE_COMMAND=${CLAUDE_COMMAND:-}

      # ── Set to true to prevent learn-repo.sh from overwriting CLAUDE.md ───
      # Useful if you've hand-crafted the project's CLAUDE.md and don't want
      # the container to regenerate it on every boot.
      - CLAUDE_MD_LOCKED=${CLAUDE_MD_LOCKED:-false}

      # ── Named agent identity for multi-agent setups ────────────────────────
      # AGENT_HUMAN_NAME — human name shown in logs and the Agent Registry UI
      #   (Alex, Sam, Jordan, Morgan…). Set a unique name per container.
      # AGENT_NAME — legacy unique ID for workboard claiming (defaults to human name)
      - AGENT_HUMAN_NAME=${AGENT_HUMAN_NAME:-}
      - AGENT_NAME=${AGENT_NAME:-${AGENT_HUMAN_NAME:-}}

      # ── Language models ──────────────────────────────────────────────────────
      # Model for Copilot CLI (uses model names from copilot --list-models)
      - AGENT_MODEL=${AGENT_MODEL:-claude-Haiku-4.5}
      # Model for Claude Code (uses Anthropic model IDs)
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-5}

      # ── GitHub Copilot CLI auth ──────────────────────────────────────────────
      # Set COPILOT_GITHUB_TOKEN (or GH_TOKEN) to an OAuth token with Copilot access.
      # Run `make token-extract` to auto-populate from the OS keychain.
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-${COPILOT_GITHUB_TOKEN:-}}

      # ── Claude Code auth ─────────────────────────────────────────────────────
      # Set ANTHROPIC_API_KEY in your shell or .env file.
      # The volume mount of ~/.claude below provides project settings.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # ── If set, clone this repo into /workspace on first boot ──────────────
      - REPO_URL=${REPO_URL:-}
      - REPO_BRANCH=${REPO_BRANCH:-main}

      # ── Virtual display for Playwright browser tests ─────────────────────
      - DISPLAY=:99

      # ── Google service-account key path (inside container) ───────────────
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/gsa-key.json

      # ── Agent Registry sheet ID ──────────────────────────────────────────
      # The Google Sheet ID of the Agent Registry sheet (agents template).
      # Set this so agents can read their tuning strings from the Waymark UI.
      # Operators edit tuning strings in the sheet; agents pick them up on boot.
      - AGENTS_SHEET_ID=${AGENTS_SHEET_ID:-1egJZTEcy0Wh0rl98sO4Voz5LgntCAIBlxt1Ez8_8fqc}

      # ── Git identity for commits made inside the container ───────────────
      - GIT_EMAIL=${GIT_EMAIL:-waymark-agent@container.local}
      - GIT_NAME=${GIT_NAME:-Waymark Agent}

    restart: unless-stopped

    volumes:
      # ── Workspace ──────────────────────────────────────────────────────────
      # Mount a local directory, or leave empty + set REPO_URL to clone.
      # Set WORKSPACE_PATH on the host to use a different local directory.
      - ${WORKSPACE_PATH:-/home/tekjanson/Documents/Code/Waymark}:/workspace

      # ── Copilot CLI auth ───────────────────────────────────────────────────
      # Plain JSON file — no gnome-keyring, no SQLite, no password-store.
      # Run `copilot --login` on the host once; container reuses the token.
      - ${COPILOT_CONFIG_PATH:-/home/tekjanson/.copilot}:/root/.copilot

      # ── Claude Code auth / config ──────────────────────────────────────────
      # Claude Code uses ANTHROPIC_API_KEY (env) for auth and ~/.claude for
      # project settings and global MCP config. Mount the host dir so the
      # agent's Claude settings persist across container restarts.
      # If you don't use Claude, this mount is a no-op (dir may be empty).
      - ${CLAUDE_CONFIG_PATH:-/home/tekjanson/.claude}:/root/.claude

      # ── Google service-account key ─────────────────────────────────────────
      - ${GSA_KEY_PATH:-/home/tekjanson/.config/gcloud/waymark-service-account-key.json}:/credentials/gsa-key.json:ro

      # ── SSH keys ───────────────────────────────────────────────────────────
      - ${SSH_PATH:-/home/tekjanson/.ssh}:/root/.ssh:ro

      # ── Docker socket (Docker-outside-of-Docker) ───────────────────────────
      # Mounts the HOST Docker daemon socket into the container.
      # The agent can now run `docker` and `docker compose` commands to:
      #   - Spawn parallel worker containers for different repos/tasks
      #   - Start databases, services, or test environments on demand
      #   - Scale itself: `docker compose up --scale agent=N`
      #   - Manage the full container lifecycle from inside the agent
      #
      # Security note: this grants the agent full Docker daemon access
      # (equivalent to root on the host). Only use on trusted networks.
      # For tighter isolation, consider a dedicated Docker socket proxy.
      #
      # Rootless Docker: The socket path on the host may differ from the
      # standard /var/run/docker.sock. Override with DOCKER_SOCKET_PATH:
      #   DOCKER_SOCKET_PATH=/run/user/1000/docker.sock make up
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

  # ── Eval/QA Worker — Quinn ────────────────────────────────────────────────────
  # A dedicated agent that monitors the QA stage of the workboard.
  # For each task in QA: checks out the branch, runs E2E tests, does code review,
  # writes a structured verdict, and posts it back. The human then decides
  # whether to approve (→ Done) or reject (→ To Do with notes).
  #
  # Uses the same image as waymark-dev-worker. Runs as agent "Quinn".
  # AGENT_ROLE=qa switches agent-runner.sh into QA patrol mode:
  #   - polls --qa-details instead of the standard To Do queue
  #   - dispatches @waymark-qa instead of @waymark-builder
  #
  # Usage:
  #   make eval-start         → start Quinn
  #   make eval-stop          → stop Quinn
  #   make eval-logs          → tail Quinn's logs
  waymark-eval-worker:
    build:
      context: .
    image: waymark-dev-worker:latest
    container_name: waymark-eval-worker

    environment:
      - AI_PROVIDER=${EVAL_AI_PROVIDER:-auto}

      # QA-specific agent command — dispatches @waymark-qa for each QA task
      - AGENT_COMMAND=@waymark-qa start
      - CLAUDE_COMMAND=waymark-qa start

      # QA patrol mode — agent-runner.sh polls --qa-details instead of To Do queue
      - AGENT_ROLE=qa

      # Quinn is the QA agent identity shown in the Agent Registry and workboard
      - AGENT_HUMAN_NAME=${EVAL_AGENT_NAME:-Quinn}
      - AGENT_NAME=${EVAL_AGENT_NAME:-Quinn}

      - CLAUDE_MD_LOCKED=${CLAUDE_MD_LOCKED:-false}

      # Use a higher-quality model for code review — Sonnet beats Haiku for QA
      - AGENT_MODEL=${EVAL_MODEL:-claude-sonnet-4.6}
      - CLAUDE_MODEL=${EVAL_CLAUDE_MODEL:-claude-opus-4-5}

      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-${COPILOT_GITHUB_TOKEN:-}}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      - REPO_URL=${REPO_URL:-}
      - REPO_BRANCH=${REPO_BRANCH:-main}
      - DISPLAY=:99
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/gsa-key.json
      - AGENTS_SHEET_ID=${AGENTS_SHEET_ID:-1egJZTEcy0Wh0rl98sO4Voz5LgntCAIBlxt1Ez8_8fqc}
      - WAYMARK_WORKBOARD_ID=${WAYMARK_WORKBOARD_ID:-}
      - GIT_EMAIL=${GIT_EMAIL:-waymark-agent@container.local}
      - GIT_NAME=${GIT_NAME:-Waymark Agent}

    restart: unless-stopped

    volumes:
      - ${WORKSPACE_PATH:-/home/tekjanson/Documents/Code/Waymark}:/workspace
      - ${COPILOT_CONFIG_PATH:-/home/tekjanson/.copilot}:/root/.copilot
      - ${CLAUDE_CONFIG_PATH:-/home/tekjanson/.claude}:/root/.claude
      - ${GSA_KEY_PATH:-/home/tekjanson/.config/gcloud/waymark-service-account-key.json}:/credentials/gsa-key.json:ro
      - ${SSH_PATH:-/home/tekjanson/.ssh}:/root/.ssh:ro
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

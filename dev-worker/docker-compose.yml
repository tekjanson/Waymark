# Waymark Dev Worker — standalone Debian GUI container with VS Code + Copilot
# Usage:
#   docker compose -f dev-worker/docker-compose.yml up -d
#   AGENT_COMMAND="@waymark-builder-sub-board start" docker compose -f dev-worker/docker-compose.yml up -d
#   AGENT_COMMAND="@waymark-manual-qa qa patrol" docker compose -f dev-worker/docker-compose.yml up -d
#   AGENT_NAME=alpha docker compose -f dev-worker/docker-compose.yml up -d
#   VNC_PASSWORD=mysecret AGENT_COMMAND="@waymark-builder pick next" docker compose ...
#
# Access the desktop at: http://localhost:6080/vnc.html (noVNC browser UI)
# Raw VNC client: localhost:5901

services:
  waymark-dev-worker:
    build:
      context: .
    image: waymark-dev-worker:latest
    container_name: waymark-dev-worker

    # Use host networking so the orchestrator's WebRTC ICE candidates
    # are real LAN IPs (not Docker-internal 172.x) that phones can reach.
    network_mode: host

    # Note: with network_mode: host, "ports" is ignored — all container
    # ports are directly available on the host (6080, 5901, 9111, etc.).

    environment:
      # No VNC password — both ports are bound to 127.0.0.1 (see ports section),
      # so only processes on this machine can connect. Safe for local dev use.

      # ── The agent command injected into Copilot Chat on every start/restart ──
      # Override this to change which agent runs, or use a .env file.
      # Examples:
      #   @waymark-builder start               (persistent loop, pushes branches)
      #   @waymark-builder-sub-board start     (local-only, never pushes)
      #   @waymark-builder pick next           (single task then stops)
      - AGENT_COMMAND=${AGENT_COMMAND:-@waymark-orchestrator start}

      # ── Phone notification rules sheet ─────────────────────────────────────
      # Google Sheets ID of the rules sheet for WebRTC push notifications.
      # Loaded automatically at orchestrator startup — no need to pass rulesSheetId as arg.
      - WAYMARK_RULES_SHEET_ID=10Vmn84-7sqyQtCLqy7b-rFrHFbXWiB7InGPl4uQ53XA

      # ── Kanban board URL (Google Sheets) ──────────────────────────────────
      # When set, overrides the default spreadsheet ID in workboard scripts.
      # Pass via: make run BOARD_URL="https://docs.google.com/spreadsheets/d/..."
      - WAYMARK_WORKBOARD_URL=${WAYMARK_WORKBOARD_URL:-}

      # ── Named agent identity for multi-agent setups ────────────────────────
      # When set, the agent uses this name for task claiming and notes.
      # Each container MUST have a unique AGENT_NAME when running multiple agents.
      # Leave unset for single-agent use (defaults to "AI" in workboard scripts).
      - AGENT_NAME=${AGENT_NAME:-}

      # Language model for the agent (as it appears in VS Code's model picker)
      - AGENT_MODEL=${AGENT_MODEL:-copilot/claude-sonnet-4.6}

      # Virtual display — must match the TigerVNC display number
      - DISPLAY=:1

      # Google service-account key path (inside container)
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/gsa-key.json

      # Git identity for commits made inside the container
      - GIT_EMAIL=${GIT_EMAIL:-waymark-agent@container.local}
      - GIT_NAME=${GIT_NAME:-Waymark Agent}

      # ── GitHub auth via host browser ───────────────────────────────────────
      # Setting BROWSER to empty prevents VS Code from trying to open a browser
      # inside the container. Instead it shows a "Copy Link" notification with
      # the GitHub device-auth URL — paste it into your host browser to auth.
      # VS Code is also launched with --password-store=basic (see start-vscode.sh)
      # so tokens are written to a file in globalStorage/ (not gnome-keyring).
      - BROWSER=

    devices:
      # Required for ydotoold kernel-level input daemon
      - /dev/uinput

    # VS Code needs extra shared memory for its Electron renderer processes
    shm_size: 2g

    # Restart on crash; stop manually with `docker compose down`
    restart: unless-stopped

    volumes:
      # ── Workspace ──────────────────────────────────────────────────────────
      # The codebase the agent reads, edits, and commits to
      - /home/tekjanson/Documents/Code/Waymark:/workspace

      # ── VS Code user config ────────────────────────────────────────────────
      # Mounted read-only as a seed source; entrypoint.sh copies it into the
      # container so VS Code can write freely (auth tokens, extension state, etc.)
      - /home/tekjanson/.config/Code/User:/host-vscode-user:ro

      # ── VS Code extensions cache ───────────────────────────────────────────
      # Mounted read-write: avoids re-downloading on each container restart.
      # Safe because VS Code extension installs are idempotent.
      - /home/tekjanson/.vscode/extensions:/root/.vscode/extensions

      # ── Google service-account key ─────────────────────────────────────────
      # Needed by check-workboard.js, update-workboard.js, etc.
      - /home/tekjanson/.config/gcloud/waymark-service-account-key.json:/credentials/gsa-key.json:ro

      # ── Google OAuth user token ────────────────────────────────────────────
      # Needed by generate-test-report.js --upload and generate-examples.js.
      # Service accounts have no Drive quota; uploads use this user OAuth token.
      # Generated once on the host with: node scripts/get-oauth-token.js
      - /home/tekjanson/.config/gcloud/waymark-oauth-token.json:/root/.config/gcloud/waymark-oauth-token.json:ro

      # ── SSH keys ───────────────────────────────────────────────────────────
      # Needed for git push / pull over SSH
      - /home/tekjanson/.ssh:/root/.ssh:ro

      # ── GitHub Copilot auth token storage ─────────────────────────────────
      # Named volume: persists OAuth tokens across container rebuilds.
      # VS Code writes here when --password-store=basic is set.
      # First-run auth flow:
      #   1. Open http://localhost:6080/vnc.html
      #   2. VS Code shows a "Sign in to GitHub" notification
      #   3. Click the notification or use the Copilot icon → copy the URL
      #   4. Open that URL in your HOST browser and complete OAuth
      #   5. Token saved here — no re-auth needed until token expires
      # To force re-auth: docker volume rm waymark-vscode-auth
      - waymark-vscode-auth:/root/.config/Code/User/globalStorage

      # ── Agent session logs ─────────────────────────────────────────────────
      # Host-mounted read-write so logs are visible from the host immediately.
      # Agents append to /agent-logs/session-{timestamp}.log inside the container.
      # View with: make agent-logs
      - /home/tekjanson/Documents/Code/Waymark/agent-logs:/agent-logs

      # ── VS Code workspace storage (Copilot chat history) ───────────────────
      # Bind-mounted so VS Code writes chat sessions directly to the host.
      # The container accumulates nothing — all workspaceStorage I/O goes straight
      # to this host directory, making raw Copilot chat logs readable immediately.
      # Copilot logs land at:
      #   agent-logs/vscode-workspace-storage/{hash}/GitHub.copilot-chat/debug-logs/
      # View with: make chat-logs
      - /home/tekjanson/Documents/Code/Waymark/agent-logs/vscode-workspace-storage:/root/.config/Code/User/workspaceStorage

volumes:
  # Persists GitHub Copilot OAuth tokens across container rebuilds.
  # Survives `docker compose down` and `up --build`.
  # Only cleared by: docker volume rm waymark-vscode-auth
  waymark-vscode-auth:
